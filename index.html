<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>VoiceMagic — Voice Changer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;font-family:'Segoe UI',sans-serif;display:flex;justify-content:center;align-items:center;min-height:100dvh;overflow:hidden;user-select:none}
.game{width:100vw;height:100dvh;max-width:600px;background:linear-gradient(180deg,#16213e,#0f3460);display:flex;flex-direction:column;position:relative;overflow:hidden}
.header{text-align:center;padding:12px;flex-shrink:0}
.header h1{color:#f1c40f;font-size:clamp(20px,5vw,30px);font-weight:900;letter-spacing:2px}
.header p{color:#888;font-size:clamp(10px,2.5vw,13px);margin-top:2px}
.content{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 16px;gap:12px}
.viz-area{width:100%;height:clamp(80px,20vh,150px);background:rgba(0,0,0,0.3);border-radius:16px;overflow:hidden;position:relative;border:2px solid rgba(78,204,163,0.3)}
.viz-area canvas{width:100%;height:100%;display:block}
.viz-placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#555;font-size:clamp(12px,3vw,16px);pointer-events:none}
.status{color:#aaa;font-size:clamp(12px,3vw,14px);text-align:center;min-height:1.5em}
.big-btn{width:clamp(80px,20vw,120px);height:clamp(80px,20vw,120px);border-radius:50%;border:none;font-size:clamp(32px,8vw,50px);cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(0,0,0,0.3)}
.big-btn.record{background:linear-gradient(135deg,#e74c3c,#c0392b);color:#fff}
.big-btn.record.recording{background:linear-gradient(135deg,#c0392b,#900);animation:pulse 0.6s ease infinite}
.big-btn.play{background:linear-gradient(135deg,#4ecca3,#2ecc71);color:#fff}
.big-btn.play.playing{background:linear-gradient(135deg,#2ecc71,#1a9e4a);animation:pulseGreen 0.6s ease infinite}
.big-btn:active{transform:scale(0.9)}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(231,76,60,0.4)}50%{box-shadow:0 0 0 20px rgba(231,76,60,0)}}
@keyframes pulseGreen{0%,100%{box-shadow:0 0 0 0 rgba(78,204,163,0.4)}50%{box-shadow:0 0 0 20px rgba(78,204,163,0)}}
.effects{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(6px,2vw,10px);width:100%;max-width:360px;flex-shrink:0}
.effect-btn{aspect-ratio:1;border-radius:16px;border:2px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:#fff;cursor:pointer;transition:all 0.2s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:clamp(10px,2.5vw,13px);font-weight:600}
.effect-btn .emoji{font-size:clamp(22px,5.5vw,36px)}
.effect-btn.active{border-color:#f1c40f;background:rgba(241,196,15,0.15);box-shadow:0 0 20px rgba(241,196,15,0.2)}
.effect-btn:active{transform:scale(0.95)}
.effect-btn .label{font-size:clamp(9px,2vw,12px);color:#aaa;font-weight:400}
.effect-btn.active .label{color:#f1c40f}
.bottom-bar{display:flex;justify-content:center;gap:20px;padding:8px 16px 16px;flex-shrink:0}
.reset-btn{background:rgba(255,255,255,0.1);border:none;border-radius:12px;color:#aaa;padding:8px 20px;font-size:clamp(11px,2.5vw,14px);cursor:pointer;display:flex;align-items:center;gap:4px}
.reset-btn:active{background:rgba(255,255,255,0.2)}
.overlay{position:absolute;inset:0;z-index:100;background:rgba(10,10,30,0.95);display:flex;flex-direction:column;justify-content:center;align-items:center;padding:30px;text-align:center;transition:opacity 0.4s;opacity:0;pointer-events:none}
.overlay.active{opacity:1;pointer-events:all}
.overlay .logo{font-size:clamp(50px,14vw,80px);margin-bottom:8px}
.overlay h2{font-size:clamp(24px,7vw,40px);color:#f1c40f;margin-bottom:4px}
.overlay p{color:#aaa;font-size:clamp(13px,3vw,16px);max-width:280px;margin-bottom:8px;line-height:1.4}
.overlay .mic-note{color:#555;font-size:clamp(11px,2.5vw,13px);margin-bottom:16px}
.start-btn{padding:16px 48px;font-size:clamp(18px,4vw,24px);font-weight:700;background:linear-gradient(135deg,#f1c40f,#f39c12);color:#1a1a2e;border:none;border-radius:16px;cursor:pointer;letter-spacing:2px;box-shadow:0 6px 25px rgba(241,196,15,0.3)}
.start-btn:active{transform:scale(0.95)}
</style>
</head>
<body>
<div class="game">
  <div class="header">
    <h1>🎤 VoiceMagic</h1>
    <p>Record your voice and add fun effects!</p>
  </div>
  <div class="content">
    <div class="viz-area">
      <canvas id="vizCanvas"></canvas>
      <div class="viz-placeholder" id="vizPlaceholder">🎤 Say something!</div>
    </div>
    <div class="status" id="statusText">Tap 🎤 to start recording</div>
    <div id="actionArea">
      <button class="big-btn record" id="recordBtn">🎤</button>
    </div>
    <div class="effects" id="effectsGrid">
      <div class="effect-btn" data-effect="robot"><div class="emoji">🤖</div>Robot<div class="label">beep boop</div></div>
      <div class="effect-btn" data-effect="monster"><div class="emoji">👹</div>Monster<div class="label">grrr!</div></div>
      <div class="effect-btn" data-effect="chipmunk"><div class="emoji">🐿️</div>Chipmunk<div class="label">squeak!</div></div>
      <div class="effect-btn" data-effect="echo"><div class="emoji">🗣️</div>Echo<div class="label">hello hello</div></div>
      <div class="effect-btn" data-effect="alien"><div class="emoji">👽</div>Alien<div class="label">wobble</div></div>
      <div class="effect-btn" data-effect="ghost"><div class="emoji">👻</div>Ghost<div class="label">wooooh</div></div>
    </div>
  </div>
  <div class="bottom-bar">
    <button class="reset-btn" id="resetBtn">🔄 Reset</button>
    <button class="reset-btn" id="downloadBtn">💾 Save</button>
  </div>
  <div class="overlay active" id="startOverlay">
    <div class="logo">🎤</div>
    <h2>VoiceMagic</h2>
    <p>Record your voice and magically transform it!</p>
    <div class="mic-note">🔊 Microphone access required</div>
    <button class="start-btn" id="startBtn">▶ START</button>
  </div>
</div>

<script>
var audioCtx=null,mediaRecorder=null,recordedChunks=[],recordedBuffer=null;
var isRecording=false,isPlaying=false,hasRecording=false,currentEffect=null;
var stream=null,analyserNode=null,animFrame=null,playSource=null;
var recordBtn=document.getElementById('recordBtn'),statusText=document.getElementById('statusText');
var canvas=document.getElementById('vizCanvas'),ctx=canvas.getContext('2d');
var vizPlaceholder=document.getElementById('vizPlaceholder');

function resizeViz(){var a=canvas.parentElement;canvas.width=a.clientWidth;canvas.height=a.clientHeight;}
resizeViz();window.addEventListener('resize',resizeViz);

var EFFECTS={
  robot:{apply:function(b,sr){
    var o=new Float32Array(b.length);
    for(var i=0;i<b.length;i++){
      var m=Math.sin(i*2*Math.PI*60/sr);
      var c=Math.round(b[i]*6)/6;
      o[i]=(c*0.7+m*0.3)*0.8;
    }
    return o;
  }},
  monster:{apply:function(b,sr){
    var l=Math.floor(b.length*1.5),o=new Float32Array(l);
    for(var i=0;i<l;i++){
      var si=Math.floor(i*b.length/l),f=i*b.length/l-si;
      o[i]=si+1<b.length?b[si]*(1-f)+b[si+1]*f:b[si];
    }
    return o;
  }},
  chipmunk:{apply:function(b,sr){
    var l=Math.floor(b.length*0.6),o=new Float32Array(l);
    for(var i=0;i<l;i++){
      var si=Math.floor(i*b.length/l),f=i*b.length/l-si;
      o[i]=si+1<b.length?b[si]*(1-f)+b[si+1]*f:b[si];
    }
    return o;
  }},
  echo:{apply:function(b,sr){
    var d=Math.floor(sr*0.25),o=new Float32Array(b.length+d*3);
    o.set(b);
    for(var i=0;i<b.length;i++){
      if(i+d<o.length)o[i+d]+=b[i]*0.45;
      if(i+d*2<o.length)o[i+d*2]+=b[i]*0.2;
      if(i+d*3<o.length)o[i+d*3]+=b[i]*0.08;
    }
    return o;
  }},
  alien:{apply:function(b,sr){
    var o=new Float32Array(b.length);
    for(var i=0;i<b.length;i++){
      var l=Math.sin(i*2*Math.PI*2.5/sr)*0.4+0.5;
      o[i]=b[i]*0.6+b[Math.max(0,i-Math.floor(l*200+20))]*0.4;
    }
    return o;
  }},
  ghost:{apply:function(b,sr){
    var o=new Float32Array(b.length+sr);
    o.set(b);
    for(var i=Math.floor(sr*0.02);i<b.length+sr;i++){
      o[i]=(o[i]||0)+(i-Math.floor(sr*0.02)<b.length?b[i-Math.floor(sr*0.02)]*0.3:0);
    }
    for(var i=0;i<o.length;i++){
      var e=1;
      if(i<sr*0.05)e=i/(sr*0.05);
      if(i>o.length-sr*0.1)e=(o.length-i)/(sr*0.1);
      var w=Math.sin(i*2*Math.PI*1.5/sr)*0.003;
      o[i]=o[Math.min(o.length-1,Math.max(0,i+Math.floor(w*sr)))]*e*0.6;
    }
    return o;
  }}
};

function drawViz(){
  if(!analyserNode||!isRecording){drawEmptyViz();return;}
  var d=new Uint8Array(analyserNode.frequencyBinCount);
  analyserNode.getByteTimeDomainData(d);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.lineWidth=2;ctx.strokeStyle='#4ecca3';ctx.beginPath();
  var sw=canvas.width/d.length,x=0;
  for(var i=0;i<d.length;i++){var v=d[i]/128.0;ctx.lineTo(x,v*canvas.height/2);x+=sw;}
  ctx.stroke();
  animFrame=requestAnimationFrame(drawViz);
}

function drawEmptyViz(){ctx.clearRect(0,0,canvas.width,canvas.height);}

function drawPlayViz(analyser){
  var d=new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteTimeDomainData(d);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.lineWidth=2;ctx.strokeStyle='#f1c40f';ctx.beginPath();
  var sw=canvas.width/d.length,x=0;
  for(var i=0;i<d.length;i++)ctx.lineTo(x,d[i]/128.0*canvas.height/2),x+=sw;
  ctx.stroke();
  if(isPlaying)animFrame=requestAnimationFrame(function(){drawPlayViz(analyser);});
}

document.getElementById('startBtn').addEventListener('click',async function(){
  try{
    stream=await navigator.mediaDevices.getUserMedia({audio:true});
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    document.getElementById('startOverlay').classList.remove('active');
    statusText.textContent='Tap 🎤 to start recording';
  }catch(e){statusText.textContent='⚠️ Microphone access needed!';}
});

recordBtn.addEventListener('click',function(){
  if(!audioCtx||!stream)return;
  if(isPlaying){stopPlayback();return;}
  if(isRecording){stopRecording();return;}
  if(hasRecording){playWithEffect();return;}
  startRecording();
});

function startRecording(){
  recordedChunks=[];
  mediaRecorder=new MediaRecorder(stream);
  mediaRecorder.ondataavailable=function(e){if(e.data.size>0)recordedChunks.push(e.data);};
  mediaRecorder.onstop=onRecordingComplete;
  mediaRecorder.start();
  isRecording=true;
  recordBtn.textContent='⏹️';recordBtn.className='big-btn record recording';
  statusText.textContent='🔴 Recording... tap ⏹️ to stop';
  if(!analyserNode){
    var s=audioCtx.createMediaStreamSource(stream);
    analyserNode=audioCtx.createAnalyser();analyserNode.fftSize=256;
    s.connect(analyserNode);
  }
  drawViz();
}

function stopRecording(){
  if(mediaRecorder&&mediaRecorder.state!=='inactive')mediaRecorder.stop();
  isRecording=false;
  recordBtn.textContent='🎤';recordBtn.className='big-btn record';
  if(animFrame){cancelAnimationFrame(animFrame);animFrame=null;}
  drawEmptyViz();
}

async function onRecordingComplete(){
  var blob=new Blob(recordedChunks,{type:'audio/webm'});
  var ab=await blob.arrayBuffer();
  var ad=await audioCtx.decodeAudioData(ab);
  recordedBuffer=ad.getChannelData(0);
  hasRecording=true;
  recordBtn.className='big-btn play';
  recordBtn.textContent='▶️';
  statusText.textContent='✅ Got it! Pick an effect or press ▶️ to play';
}

document.querySelectorAll('.effect-btn').forEach(function(btn){
  btn.addEventListener('click',function(){
    if(!hasRecording){statusText.textContent='⚠️ Record something first!';return;}
    if(isPlaying)stopPlayback();
    var ef=this.dataset.effect;
    if(currentEffect===ef){
      currentEffect=null;
      document.querySelectorAll('.effect-btn').forEach(function(b){b.classList.remove('active');});
      statusText.textContent='Effect off. Tap ▶️ to play original';
    }else{
      document.querySelectorAll('.effect-btn').forEach(function(b){b.classList.remove('active');});
      this.classList.add('active');
      currentEffect=ef;
      statusText.textContent='✨ '+ef.charAt(0).toUpperCase()+ef.slice(1)+' selected!';
    }
  });
});

function playWithEffect(){
  if(!recordedBuffer)return;
  isPlaying=true;
  recordBtn.textContent='⏹️';recordBtn.className='big-btn play playing';
  vizPlaceholder.style.display='none';
  var sr=audioCtx.sampleRate;
  var data=recordedBuffer;
  if(currentEffect&&EFFECTS[currentEffect])data=EFFECTS[currentEffect].apply(data,sr);
  var buf=audioCtx.createBuffer(1,data.length,sr);
  buf.getChannelData(0).set(data);
  var src=audioCtx.createBufferSource();src.buffer=buf;
  var g=audioCtx.createGain();g.gain.value=0.7;
  src.connect(g);g.connect(audioCtx.destination);
  var pa=audioCtx.createAnalyser();g.connect(pa);
  drawPlayViz(pa);
  src.onended=function(){stopPlayback();};
  src.start();
  playSource=src;
}

function stopPlayback(){
  if(playSource){try{playSource.stop();}catch(e){}playSource=null;}
  isPlaying=false;
  recordBtn.className=hasRecording?'big-btn play':'big-btn record';
  recordBtn.textContent=hasRecording?'▶️':'🎤';
  if(animFrame){cancelAnimationFrame(animFrame);animFrame=null;}
  drawEmptyViz();
  if(hasRecording)vizPlaceholder.style.display='flex';
}

document.getElementById('resetBtn').addEventListener('click',function(){
  if(isPlaying)stopPlayback();
  document.querySelectorAll('.effect-btn').forEach(function(b){b.classList.remove('active');});
  currentEffect=null;
  statusText.textContent='🔄 Reset. Tap ▶️ to play original';
});

document.getElementById('downloadBtn').addEventListener('click',function(){
  if(!hasRecording||!audioCtx){statusText.textContent='⚠️ Record something first!';return;}
  var sr=audioCtx.sampleRate;
  var data=recordedBuffer;
  if(currentEffect&&EFFECTS[currentEffect])data=EFFECTS[currentEffect].apply(data,sr);
  var ns=data.length,buf=new ArrayBuffer(44+ns*2),v=new DataView(buf);
  function ws(o,s){for(var i=0;i<s.length;i++)v.setUint8(o+i,s.charCodeAt(i));}
  ws(0,'RIFF');v.setUint32(4,36+ns*2,true);
  ws(8,'WAVE');ws(12,'fmt ');v.setUint32(16,16,true);
  v.setUint16(20,1,true);v.setUint16(22,1,true);
  v.setUint32(24,sr,true);v.setUint32(28,sr*2,true);
  v.setUint16(32,2,true);v.setUint16(34,16,true);
  ws(36,'data');v.setUint32(40,ns*2,true);
  for(var i=0;i<ns;i++){var s=Math.max(-1,Math.min(1,data[i]));v.setInt16(44+i*2,s<0?s*0x8000:s*0x7FFF,true);}
  var bl=new Blob([buf],{type:'audio/wav'}),url=URL.createObjectURL(bl);
  var a=document.createElement('a');a.href=url;a.download='VoiceMagic_'+(currentEffect||'Normal')+'.wav';
  a.click();URL.revokeObjectURL(url);
  statusText.textContent='💾 Saved!';
});
</script>
</body>
</html>
